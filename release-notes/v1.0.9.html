<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Focusflow 1.0.9 Release Notes</title>
    <style>
      :root {
        --text: #16181d;
        --muted: #616977;
        --border: #e7ebf3;
        --bg: #f7f9fd;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        line-height: 1.5;
      }
      .card {
        max-width: 720px;
        margin: 0 auto;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px 22px;
      }
      h1 { margin: 0 0 12px; font-size: 24px; line-height: 1.2; }
      h2 { margin: 18px 0 8px; font-size: 15px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--muted); }
      p { margin: 8px 0; }
      ul { margin: 8px 0 0 20px; padding: 0; }
      li { margin: 6px 0; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Focusflow 1.0.9</h1>
              <p>Release 1.0.9</p>
    </main>
  </body>
</html>
